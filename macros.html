<style>
  /* ---- macros module layout (additive; reuses sheet.css tokens) ---- */
  .mac-tabs{ display:flex; flex-wrap:wrap; gap:7px; margin:10px 0 22px; }
  .mac-tab{
    cursor:pointer; border:1px solid var(--bdr); border-radius:999px; padding:8px 16px;
    font:inherit; font-size:14px; font-weight:700; color:var(--tx2);
    background:linear-gradient(180deg,var(--panel2),var(--panel)); min-height:40px;
  }
  .mac-tab:hover{ color:#fff; border-color:var(--tx3); }
  .mac-tab.active{ color:#fff; border-color:var(--teal); background:rgba(70,198,224,0.13); }
  .mac-panel{ display:none; }
  .mac-panel.active{ display:block; }

  .mac-toolbar{ display:flex; flex-wrap:wrap; gap:9px; align-items:center; margin:6px 0 16px; }
  .mac-search{ position:relative; flex:1 1 240px; min-width:0; }
  .mac-search input{
    width:100%; font:inherit; font-size:16px; color:var(--tx);
    background:var(--panel2); border:1px solid var(--bdr); border-radius:11px;
    padding:12px 14px 12px 40px; outline:none;
  }
  .mac-search input:focus{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(70,198,224,0.15); }
  .mac-search .mag{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.7; pointer-events:none; }

  .mac-regsel{
    font:inherit; font-size:15px; color:var(--tx); background:var(--panel2);
    border:1px solid var(--bdr); border-radius:11px; padding:11px 12px; min-height:46px; outline:none;
  }
  .mac-regsel:focus{ border-color:var(--teal); }

  .mac-count{ color:var(--tx3); font-size:13px; margin:0 0 12px; min-height:1em; }

  /* template / macro rows reuse .dx for the title look */
  .mac-row{
    border:1px solid var(--bdr); border-radius:11px; padding:13px 16px 14px; margin:0 0 13px;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
  }
  .mac-row .dx{ margin:0 0 4px; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .mac-row .reg-pill{
    font-size:10.5px; font-weight:800; letter-spacing:.7px; text-transform:uppercase;
    border:1px solid var(--rc,var(--teal)); color:var(--rc,var(--teal));
    border-radius:999px; padding:2px 9px; background:color-mix(in srgb, var(--rc,var(--teal)) 12%, transparent);
  }
  .mac-line{ margin:9px 0 4px; padding-left:14px; border-left:2px solid #25303e; }
  .mac-line .lab{ font-weight:800; font-size:13px; letter-spacing:.5px; text-transform:uppercase; }
  .mac-line.f .lab{ color:var(--findings); }
  .mac-line.i .lab{ color:var(--impression); }
  .mac-line .body{ color:var(--tx); font-size:15.5px; line-height:1.5; margin-top:3px; white-space:pre-wrap; }
  .mac-line .trig{ font-family:ui-monospace,Menlo,monospace; color:var(--tx3); font-size:12px; margin-top:4px; }

  .mac-btnrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  /* small action buttons reuse the .fontctl button look */
  .mac-btn{
    cursor:pointer; border:1px solid var(--bdr); border-radius:8px; background:#0d1722; color:#9fdcf0;
    font-weight:700; font-family:inherit; font-size:13.5px; line-height:1; padding:9px 14px; min-height:40px;
  }
  .mac-btn:hover{ border-color:var(--teal); color:#fff; }
  .mac-btn.primary{ background:rgba(70,198,224,0.13); border-color:var(--teal); color:#dffaff; }
  .mac-btn.danger{ color:#ffc4ca; }
  .mac-btn.danger:hover{ border-color:var(--crit); color:#fff; }
  .mac-btn.copied{ border-color:var(--green); color:#aef0cd; background:rgba(95,211,154,0.13); }

  .mac-export-grid{ display:flex; flex-wrap:wrap; gap:9px; margin:14px 0 8px; }
  .mac-export-grid .mac-btn{ font-size:14.5px; padding:11px 16px; min-height:46px; }

  .mac-form{
    border:1px solid var(--bdr); border-radius:11px; padding:14px 16px 16px; margin:0 0 18px;
    background:var(--panel);
  }
  .mac-form .row{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
  .mac-form label{ display:flex; flex-direction:column; gap:4px; font-size:12.5px; font-weight:700;
    letter-spacing:.4px; text-transform:uppercase; color:var(--tx2); flex:1 1 180px; }
  .mac-form input, .mac-form textarea{
    font:inherit; font-size:16px; color:var(--tx); background:var(--panel2);
    border:1px solid var(--bdr); border-radius:9px; padding:10px 12px; outline:none; width:100%;
  }
  .mac-form textarea{ min-height:96px; resize:vertical; line-height:1.5; }
  .mac-form input:focus, .mac-form textarea:focus{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(70,198,224,0.15); }
  .mac-form .full{ flex:1 1 100%; }

  .mac-empty{ color:var(--tx3); font-size:14.5px; padding:18px 0; }
  .mac-hidden{ display:none !important; }
  #file-import{ display:none; }
</style>
</head>
